name: Notify Private Mirror

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to private repo
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.PRIVATE_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Atlas-Axis/next-gen-atlas-private/dispatches \
            -d '{"event_type": "public-atlas-updated"}'
